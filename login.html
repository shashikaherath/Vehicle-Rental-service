<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | EliteDrive</title>
  <meta name="description" content="Access your EliteDrive account to book luxury cars and manage your current bookings.">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-premium fixed-top">
    <div class="container">
      <a class="navbar-brand navbar-brand-premium d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-speedometer2 text-info"></i>
        <span>EliteDrive</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link nav-link-premium" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-premium" href="listing.html">Vehicles</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-premium" href="about.html">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-premium" href="contact.html">Contact</a>
          </li>
        </ul>
        <ul class="navbar-nav align-items-lg-center ms-lg-2" id="navbar-auth-section">
          <!-- Populated dynamically via app.js -->
        </ul>
      </div>
    </div>
  </nav>

  <!-- Login Form Section -->
  <main class="auth-container mt-5">
    <div class="container d-flex justify-content-center">
      <div class="card card-premium auth-card p-4 p-md-5 shadow-lg">
        <div class="text-center mb-4">
          <h2 class="section-title-gradient fw-bold">Welcome Back</h2>
          <p class="text-secondary small mt-1">Access your account to book premium vehicles.</p>
        </div>

        <form id="login-form" novalidate>
          <div class="mb-3">
            <label for="login-email" class="form-label text-secondary small">Email Address</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 border-glass text-secondary" style="border-radius: 12px 0 0 12px;">
                <i class="bi bi-envelope"></i>
              </span>
              <input type="email" id="login-email" class="form-control form-control-premium border-start-0" style="border-radius: 0 12px 12px 0;" placeholder="name@example.com" required>
              <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>
          </div>

          <div class="mb-4">
            <label for="login-password" class="form-label text-secondary small">Password</label>
            <div class="input-group">
              <span class="input-group-text bg-transparent border-end-0 border-glass text-secondary" style="border-radius: 12px 0 0 12px;">
                <i class="bi bi-lock"></i>
              </span>
              <input type="password" id="login-password" class="form-control form-control-premium border-start-0" style="border-radius: 0 12px 12px 0;" placeholder="••••••••" required>
              <div class="invalid-feedback">Please enter your password.</div>
            </div>
          </div>

          <button type="submit" class="btn btn-premium-primary w-100 py-3 mb-3">
            <i class="bi bi-box-arrow-in-right me-2"></i> Log In
          </button>

          <p class="text-center text-secondary small mb-0">
            Don't have an account? <a href="register.html" class="text-info text-decoration-none fw-semibold">Register here</a>
          </p>
        </form>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer-premium">
    <div class="container text-center">
      <p class="text-muted small mb-0">&copy; 2026 EliteDrive. All rights reserved.</p>
    </div>
  </footer>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="assets/js/app.js"></script>
  <!-- Shared Data Store -->
  <script src="assets/js/store.js"></script>
  <!-- Auth JS -->
  <script src="assets/js/auth.js"></script>
</body>
</html>
