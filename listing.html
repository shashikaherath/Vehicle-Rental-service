<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Fleet | EliteDrive</title>
  <meta name="description" content="Explore EliteDrive's fleet of high-end vehicles. Filter by category, budget, transmission, or fuel to find your perfect rental.">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="assets/css/style.css" rel="stylesheet">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-premium fixed-top">
    <div class="container">
      <a class="navbar-brand navbar-brand-premium d-flex align-items-center gap-2" href="index.html">
        <i class="bi bi-speedometer2 text-info"></i>
        <span>EliteDrive</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
          <li class="nav-item">
            <a class="nav-link nav-link-premium" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-premium" href="listing.html">Vehicles</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-premium" href="about.html">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-link-premium" href="contact.html">Contact</a>
          </li>
        </ul>
        <ul class="navbar-nav align-items-lg-center ms-lg-2" id="navbar-auth-section">
          <!-- Populated dynamically via app.js -->
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="py-5 mt-5" style="background: linear-gradient(180deg, rgba(99, 102, 241, 0.05) 0%, var(--bg-primary) 100%);">
    <div class="container py-4 mt-3">
      <h1 class="section-title-gradient fw-bold display-5">Explore Our Premium Fleet</h1>
      <p class="text-secondary mb-0">Choose from cars, vans, motorbikes, scooters, buses, lorries, trucks, and boats — one fleet for every journey.</p>
    </div>
  </header>

  <!-- Main Listing Layout -->
  <main class="pb-5">
    <div class="container">
      <div class="row g-4">
        
        <!-- Filters Sidebar -->
        <div class="col-lg-3">
          <div class="card-premium p-4 shadow-sm position-sticky" style="top: 100px; z-index: 10;">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h3 class="fw-bold text-white h5 mb-0">Filters</h3>
              <button id="btn-reset-filters" class="btn btn-link text-info text-decoration-none p-0 small">Clear All</button>
            </div>

            <!-- Search Filter -->
            <div class="mb-4">
              <label class="form-label text-secondary small">Keyword Search</label>
              <div class="input-group">
                <span class="input-group-text bg-transparent border-end-0 border-glass text-secondary">
                  <i class="bi bi-search"></i>
                </span>
                <input type="text" id="filter-search" class="form-control form-control-premium border-start-0" placeholder="e.g. Apex, Spectre">
              </div>
            </div>

            <!-- Category Filter -->
            <div class="mb-4">
              <label class="form-label text-secondary small d-block">Vehicle Type</label>
              <div class="form-check mb-2">
                <input class="form-check-input filter-category" type="checkbox" value="Car" id="cat-car">
                <label class="form-check-label text-white-50" for="cat-car">Cars</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input filter-category" type="checkbox" value="Van" id="cat-van">
                <label class="form-check-label text-white-50" for="cat-van">Vans</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input filter-category" type="checkbox" value="Motorbike" id="cat-motorbike">
                <label class="form-check-label text-white-50" for="cat-motorbike">Motorbikes</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input filter-category" type="checkbox" value="Scooter" id="cat-scooter">
                <label class="form-check-label text-white-50" for="cat-scooter">Scooters</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input filter-category" type="checkbox" value="Bus" id="cat-bus">
                <label class="form-check-label text-white-50" for="cat-bus">Buses</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input filter-category" type="checkbox" value="Lorry" id="cat-lorry">
                <label class="form-check-label text-white-50" for="cat-lorry">Lorries</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input filter-category" type="checkbox" value="Truck" id="cat-truck">
                <label class="form-check-label text-white-50" for="cat-truck">Trucks</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input filter-category" type="checkbox" value="Boat" id="cat-boat">
                <label class="form-check-label text-white-50" for="cat-boat">Boats</label>
              </div>
            </div>

            <!-- Price Slider Filter -->
            <div class="mb-4">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <label for="filter-price" class="form-label text-secondary small mb-0">Max Daily Rate</label>
                <span class="text-info fw-bold" id="price-display">$500</span>
              </div>
              <input type="range" class="form-range" id="filter-price" min="35" max="500" step="5" value="500">
              <div class="d-flex justify-content-between text-muted small mt-1">
                <span>$35</span>
                <span>$500</span>
              </div>
            </div>

            <!-- Sorting Select -->
            <div>
              <label for="filter-sort" class="form-label text-secondary small">Sort By</label>
              <select id="filter-sort" class="form-select form-control-premium">
                <option value="default">Default Features</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Vehicle Listing Grid -->
        <div class="col-lg-9">
          <!-- Total matches header -->
          <div class="d-flex justify-content-between align-items-center mb-4 bg-opacity-25 p-3 glass-panel">
            <span class="text-secondary small"><span id="results-count" class="text-white fw-bold">0</span> vehicles match your criteria</span>
          </div>

          <!-- Grid container -->
          <div class="row g-4" id="vehicles-list-grid">
            <!-- Populated dynamically via listing.js -->
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer-premium">
    <div class="container text-center">
      <p class="text-muted small mb-0">&copy; 2026 EliteDrive. All rights reserved.</p>
    </div>
  </footer>

  <!-- Bootstrap 5 Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Global App JS -->
  <script src="assets/js/app.js"></script>
  <!-- Data JS -->
  <script src="assets/js/data.js"></script>
  <!-- Listing Page JS -->
  <script src="assets/js/listing.js"></script>
</body>
</html>
